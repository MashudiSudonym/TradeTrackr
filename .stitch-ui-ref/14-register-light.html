<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeTrackr - Register (Light)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9f9f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .screen {
            width: 390px;
            min-height: 780px;
            background: #f9f9f9;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            margin-top: 32px;
            margin-bottom: 32px;
        }

        .app-name {
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: #2d3435;
            margin-bottom: 8px;
        }

        .subtitle {
            font-weight: 400;
            font-size: 14px;
            color: #5a6061;
        }

        .form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-container {
            background: #f2f4f4;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s ease;
            position: relative;
        }

        .input-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #be0038;
            transition: all 0.2s ease;
            transform: translateX(-50%);
        }

        .input-container:focus-within {
            background: #ffffff;
        }

        .input-container:focus-within::after {
            width: 100%;
        }

        .input-label {
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #5a6061;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #2d3435;
            outline: none;
        }

        .input-field::placeholder {
            color: #5a6061;
        }

        .eye-icon {
            width: 20px;
            height: 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .eye-icon:hover {
            opacity: 1;
        }

        .btn-primary {
            width: 100%;
            max-width: 320px;
            height: 48px;
            margin: 16px auto 0;
            background: linear-gradient(135deg, #be0038 0%, #a80030 100%);
            border: none;
            border-radius: 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: #fff6f5;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 12px 32px rgba(190, 0, 56, 0.1);
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .bottom-section {
            padding: 32px 0 48px;
            text-align: center;
        }

        .bottom-text {
            font-weight: 400;
            font-size: 14px;
            color: #5a6061;
        }

        .bottom-link {
            font-weight: 600;
            font-size: 14px;
            color: #be0038;
            text-decoration: none;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">
            <div class="app-name">TradeTrackr</div>
            <div class="subtitle">Create Your Account</div>
        </div>

        <form class="form">
            <div class="input-group">
                <div class="input-container">
                    <div class="input-label">Display Name</div>
                    <div class="input-wrapper">
                        <input type="text" class="input-field" placeholder="Enter your name">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="input-container">
                    <div class="input-label">Email</div>
                    <div class="input-wrapper">
                        <input type="email" class="input-field" placeholder="user@example.com">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="input-container">
                    <div class="input-label">Password</div>
                    <div class="input-wrapper">
                        <input type="password" class="input-field" placeholder="Enter password">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <div class="input-container">
                    <div class="input-label">Confirm Password</div>
                    <div class="input-wrapper">
                        <input type="password" class="input-field" placeholder="Confirm password">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="bottom-section">
            <span class="bottom-text">Already have an account?</span>
            <a href="#" class="bottom-link">Sign In</a>
        </div>
    </div>
</body>
</html>
