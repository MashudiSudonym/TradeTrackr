name: tradetrackr
description: "Cross-platform trading journal app for recording, analyzing, and improving trading performance."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^14.8.1

  # Local database
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # Remote backend
  supabase_flutter: ^2.8.5

  # Data classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.70.2

  # CSV parsing
  csv: ^6.0.0

  # Logging
  logger: ^2.5.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # File access
  file_picker: ^9.2.3

  # Date/Time
  intl: ^0.20.2

  # UUID
  uuid: ^4.5.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # Filesystem
  path_provider: ^2.1.5
  path: ^1.9.1

  # Sharing
  share_plus: ^10.1.4

  # Fonts
  google_fonts: ^6.2.1

  # Local storage
  shared_preferences: ^2.3.5

  # Functional programming
  fpdart: ^1.1.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/csv/
